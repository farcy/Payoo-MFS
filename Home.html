<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>

    <!--  Daisy UI & tailwind css CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>  

    <!-- font awesome CDN -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-[#D9D9D9] h-[100vh]">



   <div class="max-w-lg mx-auto bg-white rounded-b-xl p-4">
     <!-- navbar  -->
    <nav class=" min-h-[50px]  flex justify-between items-center  border-b-1 border-gray-400">

        <div class="flex items-center">
            <img src="./assets/Group.png" class="h-[50px] w-[50px]" alt="">
            <div class="ml-3">
                <h2 class="font-extrabold">$<span>45000</span></h2>
                <p class="text-[#04040490]">Available Balance</p>
            </div>
        </div>

        <div>
            <button class="btn text-[#04040490]">
                <i class="fa-solid fa-arrow-right-from-bracket rotate-180 text-gray-700"></i> Logout
            </button>
        </div>

    </nav>


    <div class=" mt-8">
        <h1 class="text-2xl font-bold">🔥 Welcome to Payooo!</h1>
        <p class="mt-[12px] text-gray-600">Enjoy easy and convenient financial services with us. <br> Cashout charge is low and</p>
    </div>


    <div class=" min-h-[200px] grid grid-cols-3 gap-2 ">

        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/wallet1.png" alt="" class="mx-auto">
            <h2>Add Money</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/send1.png" alt="" class="mx-auto">
            <h2>Cashout</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/money1.png" alt="" class="mx-auto">
            <h2>Transfer Money</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/bonus1.png" alt="" class="mx-auto">
            <h2>Get Bonus</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/purse1.png" alt="" class="mx-auto">
            <h2>Pay Bill</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/transaction1.png" alt="" class="mx-auto">
            <h2>Transaction</h2>
        </div> 
    </div>
   </div>



   <!-- form section -->
    <div class="all-form-section max-w-lg mx-auto mt-5">
        <!-- Add Money -->
         <div>
            <h1>Add Money</h1>
            <form action="" class="bg-white rounded-2xl p-8 border-none">
                <div>
                    <h1>Select A Bank</h1>
                    <select class="select">
                        <option disabled selected>Pick a color</option>
                        <option>Crimson</option>
                        <option>Amber</option>
                        <option>Velvet</option>
                    </select>
                </div>
                <div>
                    <h1>Bank Account Number</h1>
                </div>
                <div>
                    <h1>Amount to Add</h1>
                </div>
                <div></div>
            </form>
         </div>

    </div>

</body>
</html>
