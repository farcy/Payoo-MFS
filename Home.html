<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>

    <!--  Daisy UI & tailwind css CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>  

    <!-- font awesome CDN -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body class="bg-[#D9D9D9] pb-8">

   <div class="max-w-lg mx-auto bg-white rounded-b-xl p-4">
     <!-- navbar  -->
    <nav class=" min-h-[50px]  flex justify-between items-center  border-b-1 border-gray-400 pb-4">

        <div class="flex items-center">
            <img src="./assets/Group.png" class="h-[50px] w-[50px]" alt="">
            <div class="ml-3">
                <h2 class="font-extrabold">$<span>45000</span></h2>
                <p class="text-[#04040490]">Available Balance</p>
            </div>
        </div>

        <div>
            <button class="btn text-[#04040490]">
                <i class="fa-solid fa-arrow-right-from-bracket rotate-180 text-gray-700"></i> Logout
            </button>
        </div>

    </nav>


    <div class=" mt-8">
        <h1 class="text-2xl font-bold">🔥 Welcome to Payooo!</h1>
        <p class="mt-[12px] text-gray-600">Enjoy easy and convenient financial services with us. <br> Cashout charge is low and</p>
    </div>


    <div class=" min-h-[200px] grid grid-cols-3 gap-2 ">

        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/wallet1.png" alt="" class="mx-auto">
            <h2>Add Money</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/send1.png" alt="" class="mx-auto">
            <h2>Cashout</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/money1.png" alt="" class="mx-auto">
            <h2>Transfer Money</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/bonus1.png" alt="" class="mx-auto">
            <h2>Get Bonus</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/purse1.png" alt="" class="mx-auto">
            <h2>Pay Bill</h2>
        </div>
        <div class="border-2 border-gray-300 text-center p-3 py-5 rounded-xl">
            <img src="./assets/transaction1.png" alt="" class="mx-auto">
            <h2>Transaction</h2>
        </div> 
    </div>
   </div>

   <!-- form section -->
    <div class="all-form-section max-w-lg mx-auto mt-5">
        <!-- Add Money -->
         <div>
            <h1 class="font-bold mb-4">Add Money</h1>
            <form action="" class="bg-white rounded-2xl p-8 border-none ">
                <div>
                    <label for="" class="font-semibold">Select A Bank</label>
                    <br>
                    <select class="select bg-[#F4F5F7] mt-3 rounded-3xl w-full mb-3">
                        <option disabled selected>Brak Bank</option>
                        <option>AB Bank</option>
                        <option>City Bank</option>
                        <option>Islami Bank</option>
                    </select>
                </div>
                <div>
                    
                    <label for="" class="font-semibold">Bank Account Number</label>
                    <br>
                    <input type="text" placeholder="Enter 11 digit account number" class="input bg-[#F4F5F7] mt-3 rounded-3xl w-full mb-3" />
                </div>
                <div>
                    <label for="" class="font-semibold">Amount to Add</label>
                    <br>
                    <input type="text" placeholder="Add Amount to withdraw" class="input bg-[#F4F5F7] mt-3 rounded-3xl w-full mb-3" />
                </div>
                <div>
                    <label for="" class="font-semibold">Pin Number</label>
                    <br>
                    <input type="text" placeholder="Enter 4 digit pin number" class="input bg-[#F4F5F7] mt-3 rounded-3xl w-full mb-3" />
                </div>
                <button class="btn bg-[#0874F2] text-white w-full rounded-3xl mt-4 mb-8">Add Money</button>
                <button class="btn bg-[#0874F2] text-white w-full rounded-3xl mt-4 mb-8">Add Money</button>
            </form>
         </div>

    </div>

    <script src="./home.js"></script>
</body>
</html>
